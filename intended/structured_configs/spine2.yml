aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet1
  description: P2P_leaf1_Ethernet2
  shutdown: false
  mtu: 1550
  ip_address: 10.255.201.154/31
  metadata:
    peer: leaf1
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet2
  description: P2P_leaf2_Ethernet2
  shutdown: false
  mtu: 1550
  ip_address: 10.255.201.158/31
  metadata:
    peer: leaf2
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet3
  description: P2P_leaf3_Ethernet2
  shutdown: false
  mtu: 1550
  ip_address: 10.255.201.162/31
  metadata:
    peer: leaf3
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet4
  description: P2P_leaf4_Ethernet2
  shutdown: false
  mtu: 1550
  ip_address: 10.255.201.166/31
  metadata:
    peer: leaf4
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet5
  description: P2P_leaf5_Ethernet2
  shutdown: false
  mtu: 1550
  ip_address: 10.255.201.170/31
  metadata:
    peer: leaf5
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet6
  description: P2P_leaf6_Ethernet2
  shutdown: false
  mtu: 1550
  ip_address: 10.255.201.174/31
  metadata:
    peer: leaf6
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet7
  description: P2P_borderleaf1_Ethernet2
  shutdown: false
  mtu: 1550
  ip_address: 10.255.201.178/31
  metadata:
    peer: borderleaf1
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet8
  description: P2P_borderleaf2_Ethernet2
  shutdown: false
  mtu: 1550
  ip_address: 10.255.201.182/31
  metadata:
    peer: borderleaf2
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
hostname: spine2
ip_routing: true
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.255.0.101/32
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: default
  ip_address: 192.168.0.112/24
  type: oob
metadata:
  is_deployed: true
  platform: vEOS-lab
  fabric_name: FABRIC
  validate_hardware:
    enabled: false
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.0.0/24 eq 32
route_maps:
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65000'
  router_id: 10.255.0.101
  maximum_paths:
    paths: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    next_hop_unchanged: true
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.201.155
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65202'
    metadata:
      peer: leaf1
    description: leaf1_Ethernet2
  - ip_address: 10.255.201.159
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65202'
    metadata:
      peer: leaf2
    description: leaf2_Ethernet2
  - ip_address: 10.255.201.163
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65204'
    metadata:
      peer: leaf3
    description: leaf3_Ethernet2
  - ip_address: 10.255.201.167
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65204'
    metadata:
      peer: leaf4
    description: leaf4_Ethernet2
  - ip_address: 10.255.201.171
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65206'
    metadata:
      peer: leaf5
    description: leaf5_Ethernet2
  - ip_address: 10.255.201.175
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65206'
    metadata:
      peer: leaf6
    description: leaf6_Ethernet2
  - ip_address: 10.255.201.179
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65300'
    metadata:
      peer: borderleaf1
    description: borderleaf1_Ethernet2
  - ip_address: 10.255.201.183
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65300'
    metadata:
      peer: borderleaf2
    description: borderleaf2_Ethernet2
  - ip_address: 10.255.0.109
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65300'
    metadata:
      peer: borderleaf1
    description: borderleaf1_Loopback0
  - ip_address: 10.255.0.110
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65300'
    metadata:
      peer: borderleaf2
    description: borderleaf2_Loopback0
  - ip_address: 10.255.0.103
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65202'
    metadata:
      peer: leaf1
    description: leaf1_Loopback0
  - ip_address: 10.255.0.104
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65202'
    metadata:
      peer: leaf2
    description: leaf2_Loopback0
  - ip_address: 10.255.0.105
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65204'
    metadata:
      peer: leaf3
    description: leaf3_Loopback0
  - ip_address: 10.255.0.106
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65204'
    metadata:
      peer: leaf4
    description: leaf4_Loopback0
  - ip_address: 10.255.0.107
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65206'
    metadata:
      peer: leaf5
    description: leaf5_Loopback0
  - ip_address: 10.255.0.108
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65206'
    metadata:
      peer: leaf6
    description: leaf6_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: none
transceiver_qsfp_default_mode_4x10: true
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vrfs:
- name: default
  ip_routing: false
