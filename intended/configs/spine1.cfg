!
no enable password
no aaa root
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname spine1
!
spanning-tree mode none
!
interface Ethernet1
   description P2P_leaf1_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.255.201.152/31
!
interface Ethernet2
   description P2P_leaf2_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.255.201.156/31
!
interface Ethernet3
   description P2P_leaf3_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.255.201.160/31
!
interface Ethernet4
   description P2P_leaf4_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.255.201.164/31
!
interface Ethernet5
   description P2P_leaf5_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.255.201.168/31
!
interface Ethernet6
   description P2P_leaf6_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.255.201.172/31
!
interface Ethernet7
   description P2P_borderleaf1_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.255.201.176/31
!
interface Ethernet8
   description P2P_borderleaf2_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.255.201.180/31
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.255.0.100/32
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   ip address 192.168.0.111/24
!
ip routing
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 10.255.0.0/24 eq 32
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
router bfd
   multihop interval 300 min-rx 300 multiplier 3
!
router bgp 65000
   router-id 10.255.0.100
   no bgp default ipv4-unicast
   maximum-paths 4
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS next-hop-unchanged
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS send-community
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 256000
   neighbor 10.255.0.103 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.0.103 remote-as 65202
   neighbor 10.255.0.103 description leaf1_Loopback0
   neighbor 10.255.0.104 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.0.104 remote-as 65202
   neighbor 10.255.0.104 description leaf2_Loopback0
   neighbor 10.255.0.105 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.0.105 remote-as 65204
   neighbor 10.255.0.105 description leaf3_Loopback0
   neighbor 10.255.0.106 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.0.106 remote-as 65204
   neighbor 10.255.0.106 description leaf4_Loopback0
   neighbor 10.255.0.107 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.0.107 remote-as 65206
   neighbor 10.255.0.107 description leaf5_Loopback0
   neighbor 10.255.0.108 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.0.108 remote-as 65206
   neighbor 10.255.0.108 description leaf6_Loopback0
   neighbor 10.255.0.109 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.0.109 remote-as 65300
   neighbor 10.255.0.109 description borderleaf1_Loopback0
   neighbor 10.255.0.110 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.0.110 remote-as 65300
   neighbor 10.255.0.110 description borderleaf2_Loopback0
   neighbor 10.255.201.153 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.255.201.153 remote-as 65202
   neighbor 10.255.201.153 description leaf1_Ethernet1
   neighbor 10.255.201.157 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.255.201.157 remote-as 65202
   neighbor 10.255.201.157 description leaf2_Ethernet1
   neighbor 10.255.201.161 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.255.201.161 remote-as 65204
   neighbor 10.255.201.161 description leaf3_Ethernet1
   neighbor 10.255.201.165 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.255.201.165 remote-as 65204
   neighbor 10.255.201.165 description leaf4_Ethernet1
   neighbor 10.255.201.169 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.255.201.169 remote-as 65206
   neighbor 10.255.201.169 description leaf5_Ethernet1
   neighbor 10.255.201.173 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.255.201.173 remote-as 65206
   neighbor 10.255.201.173 description leaf6_Ethernet1
   neighbor 10.255.201.177 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.255.201.177 remote-as 65300
   neighbor 10.255.201.177 description borderleaf1_Ethernet1
   neighbor 10.255.201.181 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.255.201.181 remote-as 65300
   neighbor 10.255.201.181 description borderleaf2_Ethernet1
   redistribute connected route-map RM-CONN-2-BGP
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-PEERS activate
      neighbor IPv4-UNDERLAY-PEERS activate
!
end
